<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <meta name="description" content="Frontend Mentor Fylo Data Storage Component solution built with semantic HTML and CSS. 
        Responsive design featuring Flexbox and fluid typography.">

  <!-- ICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">  

  <title>Fylo Data Storage Component | Frontend Mentor</title>

  <!-- CSS STYLES -->
  <link rel="stylesheet" href="./css/style.css">

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <h1 class="sr-only">Fylo Storage Usage Dashboard</h1>
  <!-- MAIN CONTAINER -->
  <main class="main-container">
    <!-- IMAGE CONTAINER -->
    <section class="image-container">
      <img src="./images/logo.svg" alt="Fylo logo">

    <!-- ICON CONTAINER -->  
      <div class="icon-container">
        <figure class="image-box">
          <img src="./images/icon-document.svg" alt="" class="document-icon">
        </figure>
        <figure class="image-box">
          <img src="./images/icon-folder.svg" alt="" class="folder-icon">
        </figure>
        <figure class="image-box">
          <img src="./images/icon-upload.svg" alt="" class="upload-icon">
        </figure>
      </div>     
    </section>

    <!-- STORAGE CONTAINER -->
    <section class="storage-container">
      <p class="used-data">You’ve used <span class="used-value"> 815 GB</span> of your storage</p>
      <div class="storage">
        <div class="storage-bar" 
             role="progressbar"
             aria-label="Storage used"
             aria-valuenow="815"
             aria-valuemin="0"
             aria-valuemax="1000"
             aria-valuetext="815 GB used out of 1000 GB">
          <div class="storage-fill">
            <div class="storage-dot"></div>
          </div>          
        </div>
      </div>
      <p class="storage-data"><span>0 GB</span> <span>1000 GB</span></p>  
      
    <!-- DATA -->
    <div class="data-remained">
      <div class="data-gb">185 <span class="gb"> GB Left</span></div>
    </div>
    </section>   
  </main>  

  <!-- FOOTER -->
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io/challenges/fylo-data-storage-component-1dZPRbV5n">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/codecove01-netizen">Arati D'sa</a>.
  </footer>
</body>
</html>
